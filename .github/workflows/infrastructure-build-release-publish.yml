# cloud-5: build Strudel site; on version tags publish bundle + gogins.github.io.
#
# Triggers
#   - push (any branch): build only (CI verify)
#   - push tag v*: build, update rolling cloud-5-bundle release, attach assets to the
#     version tag release (cloud-5.zip + cloud-5-bundle.zip), sync gogins.github.io
#   - workflow_dispatch: build; optional bundle and/or Pages sync
#
# gogins.github.io
#   - strudel/website/dist is merged at the repo root via scripts/publish-github-pages-from-dist.sh
#   - Paths listed in .cloud5-dist-manifest.txt are owned by cloud-5; retired Rollup chunks
#     are removed only when they drop out of the manifest (not gogins-only files).
#
# Secrets (cloud-5 repository):
#   GOGINS_IO_DEPLOY_TOKEN — PAT with contents:write on gogins/gogins.github.io
#
# env:
#   BUNDLE_RELEASE_TAG — rolling release tag for the zip (default cloud-5-bundle)

name: Build, bundle release, publish Pages

on:
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: Upload rolling cloud-5-bundle release
        type: boolean
        default: true
      publish_gogins_github_io:
        description: Sync strudel/website/dist to gogins.github.io (after release job succeeds)
        type: boolean
        default: true
  push:
    tags:
      - 'v*'
    branches:
      - '**'

concurrency:
  group: cloud-5-infrastructure-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  BUNDLE_RELEASE_TAG: cloud-5-bundle

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cloud-5 (with Strudel submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Update Strudel submodule to branch tip
        if: github.ref_type != 'tag'
        run: git submodule update --remote strudel

      - name: Checkout csound-wasm (Embind API source)
        uses: actions/checkout@v4
        with:
          repository: gogins/csound-wasm
          path: csound-wasm
          fetch-depth: 1

      - name: Checkout csound-ac (Doxygen)
        uses: actions/checkout@v4
        with:
          repository: gogins/csound-ac
          path: csound-ac
          fetch-depth: 1

      - name: Install pandoc and doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pandoc doxygen

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies and build
        env:
          CSOUND_WASM_EMBIND: ${{ github.workspace }}/csound-wasm/CsoundAC/csoundac_embind.cpp
          CSOUND_AC_ROOT: ${{ github.workspace }}/csound-ac
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          bash scripts/verify-csound-wasm-dist.sh
          pnpm run build

      - name: Create source + dist zip (exclude node_modules and .git)
        if: github.repository == 'gogins/cloud-5'
        run: |
          set -euo pipefail
          out="${GITHUB_WORKSPACE}/cloud-5-bundle.zip"
          rm -f "${out}"
          (
            cd "${GITHUB_WORKSPACE}"
            zip -r "${out}" . \
              -x '.git/*' \
              -x '*node_modules/*' \
              -x '*.zip'
          )
          ls -lh "${out}"

      - name: Upload build artifacts
        if: github.repository == 'gogins/cloud-5'
        uses: actions/upload-artifact@v4
        with:
          name: cloud-5-build
          if-no-files-found: error
          path: |
            strudel/website/dist/
            cloud-5.zip
            cloud-5-bundle.zip

  release:
    needs: build
    if: >-
      github.repository == 'gogins/cloud-5' &&
      (
        (github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_github_release)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Download bundle zip
        uses: actions/download-artifact@v4
        with:
          name: cloud-5-build
          path: artifacts

      - name: Publish or update rolling GitHub Release (zip only)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BUNDLE_ZIP="artifacts/cloud-5-bundle.zip"
          if [[ ! -f "${BUNDLE_ZIP}" ]]
          then
            echo "cloud-5-bundle.zip not found in artifact" >&2
            find artifacts -type f | head -50 >&2 || true
            exit 1
          fi
          if ! gh release view "${BUNDLE_RELEASE_TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1
          then
            gh release create "${BUNDLE_RELEASE_TAG}" \
              --repo "${{ github.repository }}" \
              --title "cloud-5 bundle (rolling)" \
              --notes "Source tree (excluding node_modules and .git) plus built strudel/website/dist. Updated when a v* tag is pushed."
          fi
          gh release upload "${BUNDLE_RELEASE_TAG}" "${BUNDLE_ZIP}" \
            --repo "${{ github.repository }}" \
            --clobber

  versioned-release:
    needs: [build, release]
    if: >-
      github.repository == 'gogins/cloud-5' &&
      github.event_name == 'push' &&
      github.ref_type == 'tag' &&
      startsWith(github.ref_name, 'v') &&
      needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download release zips
        uses: actions/download-artifact@v4
        with:
          name: cloud-5-build
          path: artifacts

      - name: Attach dist and rolling bundle to version tag release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          DIST_ZIP="artifacts/cloud-5.zip"
          BUNDLE_ZIP="artifacts/cloud-5-bundle.zip"
          for zip in "${DIST_ZIP}" "${BUNDLE_ZIP}"
          do
            if [[ ! -f "${zip}" ]]
            then
              echo "${zip} not found in artifact" >&2
              find artifacts -type f | head -50 >&2 || true
              exit 1
            fi
          done
          if ! gh release view "${VERSION_TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1
          then
            gh release create "${VERSION_TAG}" \
              --repo "${{ github.repository }}" \
              --title "Cloud-5 ${VERSION_TAG}" \
              --notes "Built site (cloud-5.zip) and full source tree plus dist (cloud-5-bundle.zip, same as the rolling [cloud-5-bundle](https://github.com/gogins/cloud-5/releases/tag/cloud-5-bundle) release at this tag)."
          fi
          gh release upload "${VERSION_TAG}" "${DIST_ZIP}" "${BUNDLE_ZIP}" \
            --repo "${{ github.repository }}" \
            --clobber

  publish-gogins-github-io:
    needs: [build, release]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      github.repository == 'gogins/cloud-5' &&
      (
        (
          github.event_name == 'push' &&
          github.ref_type == 'tag' &&
          startsWith(github.ref_name, 'v') &&
          needs.release.result == 'success'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.publish_gogins_github_io &&
          (
            needs.release.result == 'success' ||
            inputs.publish_github_release == false
          )
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cloud-5 (publish script)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download strudel/website/dist
        uses: actions/download-artifact@v4
        with:
          name: cloud-5-build
          path: artifacts

      - name: Clone gogins.github.io and merge dist
        env:
          TOKEN: ${{ secrets.GOGINS_IO_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${TOKEN}" ]]; then
            echo "Missing secret GOGINS_IO_DEPLOY_TOKEN (needs contents:write on gogins/gogins.github.io)." >&2
            exit 1
          fi
          DIST="artifacts/strudel/website/dist"
          if [[ ! -d "${DIST}" ]]
          then
            echo "strudel/website/dist not found in artifact" >&2
            find artifacts -type d | head -40 >&2 || true
            exit 1
          fi
          pages_dir="${RUNNER_TEMP}/gogins.github.io"
          rm -rf "${pages_dir}"
          git clone "https://x-access-token:${TOKEN}@github.com/gogins/gogins.github.io.git" "${pages_dir}"
          bash "${GITHUB_WORKSPACE}/scripts/publish-github-pages-from-dist.sh" \
            "${DIST}" \
            "${pages_dir}"

      - name: Commit and push gogins.github.io (main)
        env:
          TOKEN: ${{ secrets.GOGINS_IO_DEPLOY_TOKEN }}
          CLOUD5_REF: ${{ github.ref_name }}
          CLOUD5_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          pages_dir="${RUNNER_TEMP}/gogins.github.io"
          cd "${pages_dir}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet
          then
            echo "No changes on gogins/gogins.github.io."
            exit 0
          fi
          if [[ "${{ github.ref_type }}" == "tag" ]]
          then
            git commit -m "Sync cloud-5 site from ${CLOUD5_REF}"
          else
            git commit -m "Sync cloud-5 site from ${CLOUD5_SHA:0:12}"
          fi
          git push "https://x-access-token:${TOKEN}@github.com/gogins/gogins.github.io.git" HEAD:main
